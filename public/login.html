<!doctype html>
<html>
<head><meta charset="utf-8"><title>Login</title><link rel="stylesheet" href="/styles.css"></head>
<body>
<div class="container">
  <div class="logo">
  ADstudy
</div>

  <h2>Login</h2>
  <form id="loginForm">
    <label>Email</label><input name="email" type="email" required>
    <label>Password</label><input name="password" type="password" required>
    <button>Login</button>
  </form>
  <hr>
  <h3>Register</h3>
  <form id="regForm">
    <label>Name</label><input name="name" required>
    <label>Email</label><input name="email" type="email" required>
    <label>Password</label><input name="password" type="password" required>
    <label>Role</label>
    <select name="role"><option value="teacher">Teacher</option><option value="student">Student</option></select>
    <button>Register</button>
  </form>
  <div id="msg"></div>
</div>

<script>
const msg = (t)=>document.getElementById('msg').innerText=t;
document.getElementById('loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = {email:fd.get('email'), password:fd.get('password')};
  const res = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j = await res.json();
  if(j.ok) {
    // redirect based on role
    window.location = (j.user.role === 'teacher') ? '/teacher.html' : '/student.html';
  } else msg(j.error || 'Login failed');
});
document.getElementById('regForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = {name:fd.get('name'), email:fd.get('email'), password:fd.get('password'), role:fd.get('role')};
  const res = await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j = await res.json();
  if(j.ok) msg('Registered! Please login.');
  else msg(j.error || 'Register failed');
});
</script>
</body>
</html>
